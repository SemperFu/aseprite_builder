name: Cleanup old releases

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and deploy Aseprite"]
    types:
      - completed

env:
  KEEP_COUNT: 3

jobs:
  cleanup:
    name: Remove old releases
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Delete old workflow runs (keep latest ${{ env.KEEP_COUNT }} per workflow)
        uses: actions/github-script@v7
        with:
          script: |
            const keepCount = parseInt('${{ env.KEEP_COUNT }}');

            const workflows = await github.paginate(
              github.rest.actions.listRepoWorkflows,
              { owner: context.repo.owner, repo: context.repo.repo }
            );

            for (const workflow of workflows) {
              const runs = await github.paginate(
                github.rest.actions.listWorkflowRuns,
                { owner: context.repo.owner, repo: context.repo.repo, workflow_id: workflow.id, per_page: 100 }
              );

              runs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

              if (runs.length <= keepCount) {
                console.log(`${workflow.name}: ${runs.length} run(s), nothing to clean up.`);
                continue;
              }

              const toDelete = runs.slice(keepCount);
              console.log(`${workflow.name}: deleting ${toDelete.length} of ${runs.length} runs.`);

              for (const run of toDelete) {
                try {
                  await github.rest.actions.deleteWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: run.id,
                  });
                } catch (e) {
                  console.log(`  Failed to delete run ${run.id}: ${e.message}`);
                }
              }
            }

      - name: Delete old releases (keep latest ${{ env.KEEP_COUNT }})
        uses: actions/github-script@v7
        with:
          script: |
            const keepCount = parseInt('${{ env.KEEP_COUNT }}');

            const releases = await github.paginate(
              github.rest.repos.listReleases,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );

            // Sort by created date descending (newest first)
            releases.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            if (releases.length <= keepCount) {
              console.log(`Only ${releases.length} release(s) found, nothing to clean up.`);
              return;
            }

            const toDelete = releases.slice(keepCount);
            console.log(`Found ${releases.length} releases. Keeping ${keepCount}, deleting ${toDelete.length}.`);

            for (const release of toDelete) {
              console.log(`Deleting release: ${release.name || release.tag_name} (${release.tag_name})`);

              // Delete the release
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });

              // Delete the associated tag
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`,
                });
                console.log(`  Deleted tag: ${release.tag_name}`);
              } catch (e) {
                console.log(`  Tag ${release.tag_name} already deleted or not found.`);
              }
            }

            console.log('Cleanup complete.');
